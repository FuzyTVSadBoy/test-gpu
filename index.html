<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADev Vĩ - The RTX Executioner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #overlay {
            position: absolute; top: 10px; left: 10px; 
            color: #00ff00; font-family: monospace; font-size: 16px; 
            text-shadow: 0 0 5px #000; pointer-events: none; z-index: 10;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="overlay">
        [ADev Vĩ] GPU Executioner Mode<br>
        Status: <span id="status">Initializing...</span><br>
        <span id="fps" style="color: yellow; font-size: 24px; font-weight: bold;">FPS: --</span><br>
        <small>Tip: Press F11 for Full Stress</small>
    </div>
    <script>
        // Bắt đầu với mức 1.0 để tránh lỗi "Error creating WebGL context"
        let currentScale = 1.0; 

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float time;
            uniform vec2 resolution;
            
            float map(vec3 p) {
                p.xz *= mat2(cos(time*0.3), sin(time*0.3), -sin(time*0.3), cos(time*0.3));
                vec3 q = p;
                float s = 1.0;
                for(int i = 0; i < 10; i++) {
                    p = abs(p) - vec3(0.4, 1.2, 0.4);
                    float r2 = dot(p, p);
                    float k = 1.3 / clamp(r2, 0.1, 1.0);
                    p *= k;
                    s *= k;
                }
                return length(p) / s;
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * resolution.xy) / resolution.y;
                vec3 ro = vec3(0.0, 0.0, -3.5);
                vec3 rd = normalize(vec3(uv, 1.2));
                float t = 0.0;
                int i;
                for(i = 0; i < 100; i++) {
                    float d = map(ro + rd * t);
                    if(d < 0.001 || t > 20.0) break;
                    t += d;
                }
                vec3 col = vec3(float(i)/100.0);
                col *= vec3(0.1, 0.4, 1.0) * (sin(t * 2.0 + time) * 0.5 + 0.5);
                gl_FragColor = vec4(pow(col, vec3(0.4545)), 1.0);
            }
        `;

        let renderer, scene, camera, uniforms;

        function init() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                
                // Thêm thuộc tính failIfMajorPerformanceCaveat để tránh treo máy
                renderer = new THREE.WebGLRenderer({ 
                    antialias: false,
                    failIfMajorPerformanceCaveat: false 
                });
                
                renderer.setPixelRatio(window.devicePixelRatio * currentScale);
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                uniforms = {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2() }
                };

                const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
                scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

                updateRes();
                document.getElementById('status').innerText = "Running (Safe Mode)";
                animate();
            } catch (e) {
                document.getElementById('status').innerText = "WebGL Error: " + e.message;
                console.error(e);
            }
        }

        function updateRes() {
            const w = window.innerWidth * window.devicePixelRatio * currentScale;
            const h = window.innerHeight * window.devicePixelRatio * currentScale;
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.resolution.value.set(w, h);
        }

        let frames = 0, prevTime = performance.now();
        function animate(t) {
            uniforms.time.value = t / 1000;
            renderer.render(scene, camera);
            frames++;
            let now = performance.now();
            if (now - prevTime >= 1000) {
                document.getElementById('fps').innerText = "FPS: " + frames;
                frames = 0;
                prevTime = now;
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', updateRes);
        window.onload = init;
    </script>
</body>
</html>
