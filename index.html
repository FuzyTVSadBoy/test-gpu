<!DOCTYPE html>
<html>
<head>
    <title>ADev Vĩ - Ultra GPU Stress Test</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { width: 100vw; height: 100vh; }
        #info { position: absolute; top: 10px; left: 10px; color: lime; font-family: monospace; }
    </style>
</head>
<body>
    <div id="info">RTX 4060 Killer v1.0 | Status: Heavy Rendering...</div>
    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;
        
        // ĐOẠN SHADER HÀNH HẠ GPU Ở ĐÂY
        const fragmentShader = `
            uniform float time;
            uniform vec2 resolution;

            // Tăng số vòng lặp để vắt kiệt CUDA Cores
            #define ITERATIONS 128 
            
            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * resolution.xy) / resolution.y;
                vec3 ro = vec3(0, 0, -3.0 + sin(time * 0.5));
                vec3 rd = normalize(vec3(uv, 1.0));
                vec3 col = vec3(0);
                
                float t = 0.0;
                for(int i = 0; i < 256; i++) { // 256 bước dò tia
                    vec3 p = ro + rd * t;
                    // Công thức Fractal Mandelbulb rút gọn - cực kỳ ngốn tính toán
                    float d = length(p) - 1.0; 
                    for(int j = 0; j < 8; j++) {
                        p = abs(p) / dot(p,p) - 0.8;
                        d = min(d, length(p));
                    }
                    if(d < 0.001 || t > 20.0) break;
                    t += d * 0.5;
                }
                col = vec3(0.1, 0.2, 0.5) * (t * 0.2);
                gl_FragColor = vec4(col, 1.0);
            }
        `;

        // Thiết lập Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.PlaneGeometry(2, 2);
        const uniforms = {
            time: { value: 0 },
            resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
        };
        const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function animate(t) {
            uniforms.time.value = t / 1000;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
